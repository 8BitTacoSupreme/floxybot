{
  "lockfile-version": 1,
  "manifest": {
    "version": 1,
    "install": {
      "flox-mcp-server": {
        "pkg-path": "flox/flox-mcp-server"
      },
      "git": {
        "pkg-path": "git"
      },
      "gnumake": {
        "pkg-path": "gnumake"
      },
      "go": {
        "pkg-path": "go"
      },
      "jq": {
        "pkg-path": "jq"
      },
      "linode-cli": {
        "pkg-path": "linode-cli"
      }
    },
    "vars": {
      "FLOXYBOT_CANON_DIR": "$FLOX_ENV_PROJECT/data/canon"
    },
    "hook": {
      "on-activate": "  mkdir -p \"$FLOXYBOT_CANON_DIR\"\n\n  echo \"floxybot dev environment activated\"\n  echo \"  Build:   make build\"\n  echo \"  Test:    make test\"\n  echo \"  Run:     ./floxybot context\"\n"
    },
    "profile": {},
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-linux"
      ]
    },
    "build": {
      "floxybot": {
        "command": "  mkdir -p $out/bin\n  go build -ldflags \"-X main.version=0.1.0\" -o $out/bin/floxybot ./cmd/floxybot\n",
        "version": "0.1.0",
        "description": "AI assistant for Flox"
      }
    }
  },
